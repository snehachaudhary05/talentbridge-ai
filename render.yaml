services:
  - type: web
    name: talentbridge-backend
    runtime: python
    buildCommand: "./job-portal-backend/build.sh"
    startCommand: "cd job-portal-backend && gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AI_PROVIDER
        value: openrouter
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_FROM_NAME
        value: TalentBridge AI
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
